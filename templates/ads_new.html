<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>💰 Реклама и продвижение</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", sans-serif;
      color: #fff;
      background: linear-gradient(135deg, #0066a1, #00c6c3);
      background-size: 200% 200%;
      animation: gradientMove 10s ease infinite;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 100vh;
      text-align: center;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    h1 {
      font-size: 24px;
      margin-top: 35px;
    }

    p {
      font-size: 15px;
      opacity: 0.9;
      margin-bottom: 20px;
    }

    .chart-card {
      width: 92%;
      max-width: 520px;
      margin: 0 auto;
      background: rgba(255,255,255,0.08);
      border-radius: 14px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.25);
      padding: 16px 12px;
    }

    canvas {
      width: 100% !important;
      height: 260px !important;
    }

    .btn {
      margin: 25px auto 80px;
      background: linear-gradient(90deg, #00aaff, #00ffcc);
      color: #00344f;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.25);
      transition: all 0.3s ease;
      display: inline-block;
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 14px rgba(0,0,0,0.3);
    }
  </style>
</head>

<body>
  <main>
    <h1>💰 Реклама и продвижение</h1>
    <p>Эффективность рекламных кампаний за последние 14 дней</p>

    <div class="chart-card">
      <canvas id="adsChart"></canvas>
    </div>

  </main>

  {% include 'partials/footer.html' %}

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    document.body.style.background = "linear-gradient(135deg, #0066a1, #00c6c3)";
    document.body.style.backgroundSize = "200% 200%";
    document.body.style.animation = "gradientMove 10s ease infinite";

    const ctx = document.getElementById('adsChart').getContext('2d');
    new Chart(ctx, {
      type: 'line',
      data: {
        labels: ['Пн','Вт','Ср','Чт','Пт','Сб','Вс','Пн+','Вт+'],
        datasets: [
          {
            label: 'CTR (%)',
            data: [1.8,2.1,2.4,2.8,3.0,3.2,3.5,3.8,4.1],
            borderColor: '#00ffcc',
            backgroundColor: 'rgba(0,255,204,0.15)',
            tension: 0.35,
            fill: true
          },
          {
            label: 'Конверсии (%)',
            data: [0.9,1.0,1.2,1.5,1.7,1.8,2.0,2.2,2.4],
            borderColor: '#ffaa00',
            borderDash: [6,6],
            backgroundColor: 'rgba(255,170,0,0.15)',
            tension: 0.35,
            fill: false
          }
        ]
      },
      options: {
        responsive: true,
        scales: {
          y: {
            beginAtZero: true,
            ticks: { color: '#fff' },
            grid: { color: 'rgba(255,255,255,0.1)' }
          },
          x: {
            ticks: { color: '#fff' },
            grid: { display: false }
          }
        },
        plugins: { legend: { labels: { color: '#fff' } } }
      }
    });
  </script>
</body>
</html>
