name: SellerApp CI + Deploy (PRO)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sellerapp-production
  cancel-in-progress: true

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install deps
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Import app (must succeed)
        run: python -c "import app; print('import ok')"

  deploy:
    name: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [ ci ]
    if: ${{ github.ref == 'refs/heads/main' && needs.ci.result == 'success' }}
    environment:
      name: production
    steps:
      - name: Deploy on VPS (protected)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          command_timeout: 10m
          script: |
            /usr/local/bin/deploy-sellerapp.sh
